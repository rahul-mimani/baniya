name = "billmaker-auth"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# =============================================================================
# CONFIG NOTE (open-source): the [vars] below are non-secret DEFAULTS and
# PLACEHOLDERS only. Real values are provided two ways and OVERRIDE these:
#   • Local dev  → auth-service/.env  (copied to .dev.vars by `npm run dev`)
#   • Production → Cloudflare secrets (`npm run deploy:secrets`, reads .env)
# Copy .env.example → .env and fill it in. See /SETUP.md for how to obtain each
# credential. Do NOT put real secrets (Supabase keys, Cloudinary API key,
# Firebase private key, JWT secret, etc.) in this committed file.
# =============================================================================


[triggers]
# Primary sync — every 2 min. Mobile-critical: bills, customers (name
# registry for autocomplete), _meta (admin_aggregates). Cheap because
# incremental sync only reads docs modified since the last cursor — quiet
# ticks cost ~0 reads.
#
# Secondary sync — every 5 min. Admin-managed collections plus the
# products name registry. Less time-sensitive: admins add products/deals
# occasionally; mobile autocomplete picks them up within 5 min.
#
# Weekly cleanup — Sundays 03:00 UTC. Prunes expired OTPs, revoked sessions,
# and worker_events older than 10 days.
crons = ["*/2 * * * *", "*/5 * * * *", "0 3 * * SUN"]

[observability]
enabled = true

[vars]
# ONLY non-secret operational defaults live here (committed, safe to publish).
#
# All TENANT & SECRET values — SUPABASE_URL + keys, EMAIL_FROM/NAME, SHOP_CODE,
# SHOP_NAME, ALLOWED_ORIGINS, PORTAL_URL, CLOUDINARY_*, FIREBASE_*, BREVO_API_KEY,
# JWT_SECRET, OTP_PEPPER, BOOTSTRAP_SECRET, ADMIN_* — come from:
#   • local dev → .dev.vars (generated from .env by `npm run dev`)
#   • production → Cloudflare secrets (`npm run deploy:secrets`, reads .env)
# The [vars] here and the uploaded secrets are DISJOINT by name on purpose, so a
# plain `wrangler deploy` can never overwrite a secret with a committed value.
EMAIL_PROVIDER = "brevo"
OTP_TTL_MINUTES = "10"
JWT_TTL_MINUTES = "720"
JWT_TTL_CLIENT_MINUTES = "43200"
RATE_LIMIT_PER_IDENTIFIER_PER_HOUR = "10"
RATE_LIMIT_PER_IP_PER_HOUR = "30"
RATE_LIMIT_VERIFY_ATTEMPTS = "5"
RATE_LIMIT_VERIFY_PER_IP_PER_HOUR = "5"
# Worker profile controls cron behavior:
#   "primary"   — 3 crons (*/2, */5, weekly) — used by the main shop
#   "secondary" — 1 cron (*/2) with HOT collections + 1 rotating COLD
# Any additional shop's [env.<name>.vars] just sets this to "secondary".
WORKER_PROFILE = "primary"

# Cloudflare Workers Rate Limiting binding — edge-cached, free on free plan.
# Used as a fast-path block BEFORE the Supabase-based rate limit check.
# 5 requests per 60s per IP. After 5, returns 429 in ~1ms with no
# subrequest cost. https://developers.cloudflare.com/workers/runtime-apis/bindings/rate-limit/
[[unsafe.bindings]]
name = "VERIFY_OTP_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

# Edge rate limit for /auth/lookup. Real users hit it 1-3 times during a
# login flow; anything above ~10/min/IP is clearly automated. Without
# this, /auth/lookup is otherwise un-throttled because it doesn't insert
# into otp_requests (the table the slower DB-based limiter reads from).
[[unsafe.bindings]]
name = "LOOKUP_LIMITER"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 10, period = 60 }


# ===========================================================================
# EXAMPLE SECOND-SHOP ENVIRONMENT — template for onboarding another tenant,
# fully isolated from the primary config above. Delete or duplicate as needed.
#
# Deploy with:    npx wrangler deploy --env shop2
# Tail with:      npx wrangler tail --env shop2
# Set secrets:    npx wrangler secret put <NAME> --env shop2
#
# Wrangler env blocks DON'T inherit top-level [vars], [triggers], or
# [[unsafe.bindings]]. Everything that should match the primary is
# duplicated here. Only the worker name, SHOP_CODE/SHOP_NAME, WORKER_PROFILE,
# and the rate-limit namespace_ids differ. Give each shop UNIQUE
# namespace_ids so their edge rate limits don't collide.
# ===========================================================================
[env.shop2]
name = "billmaker-auth-shop2"

[env.shop2.observability]
enabled = true

# Secondary-shop sync cadence: a single */2 cron that handles HOT
# collections every tick + 1 rotating COLD collection per tick. See
# src/index.ts scheduled handler — when WORKER_PROFILE = "secondary",
# the handler picks the cold slot by minute and stays under both the
# 50-subrequest and 10ms CPU caps. Adding a new secondary shop just
# means another env block with crons = ["*/2 * * * *"] and
# WORKER_PROFILE = "secondary" — no code change.
[env.shop2.triggers]
crons = ["*/2 * * * *"]

# Non-secret defaults only (same rule as the primary [vars] above). This shop's
# SUPABASE_URL, SHOP_CODE, SHOP_NAME, ALLOWED_ORIGINS, secrets, etc. are set with
#   npx wrangler secret put <NAME> --env shop2
[env.shop2.vars]
EMAIL_PROVIDER = "brevo"
OTP_TTL_MINUTES = "10"
JWT_TTL_MINUTES = "720"
JWT_TTL_CLIENT_MINUTES = "43200"
RATE_LIMIT_PER_IDENTIFIER_PER_HOUR = "10"
RATE_LIMIT_PER_IP_PER_HOUR = "30"
RATE_LIMIT_VERIFY_ATTEMPTS = "5"
RATE_LIMIT_VERIFY_PER_IP_PER_HOUR = "5"
WORKER_PROFILE = "secondary"

[[env.shop2.unsafe.bindings]]
name = "VERIFY_OTP_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[env.shop2.unsafe.bindings]]
name = "LOOKUP_LIMITER"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 10, period = 60 }
