<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Enrichment</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      background: #f8fafc;
      color: #0f172a;
    }
    h1 { margin: 0 0 6px; font-size: 22px; }
    .shop-info { color: #64748b; font-size: 13px; margin-bottom: 18px; }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      padding: 10px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
    }
    .toolbar button {
      padding: 6px 12px;
      border: 1px solid #cbd5e1;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #f1f5f9; }
    .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .page-info { color: #64748b; font-size: 13px; }
    .product {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .product-header {
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .product-header:hover { background: #f8fafc; }
    .product-name { font-weight: 600; flex: 1; }
    .status-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f1f5f9;
      color: #475569;
    }
    .status-pill.has-desc { background: #dcfce7; color: #166534; }
    .status-pill.has-images { background: #dbeafe; color: #1e40af; }
    .product-body {
      padding: 16px;
      border-top: 1px solid #e2e8f0;
      background: #fafbfc;
      display: none;
    }
    .product.open .product-body { display: block; }
    .section { margin-bottom: 14px; }
    .section-label { font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }
    .image-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .image-tile {
      width: 90px;
      height: 90px;
      border: 2px solid #cbd5e1;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      background: white;
    }
    .image-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-tile.selected { border-color: #2563eb; }
    .image-tile.selected::after {
      content: '✓';
      position: absolute;
      top: 2px;
      right: 4px;
      background: #2563eb;
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .selected-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
      border: 1px dashed #cbd5e1;
      border-radius: 4px;
      min-height: 100px;
      background: white;
    }
    .selected-tile {
      width: 90px;
      height: 90px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .selected-tile img { width: 100%; height: 100%; object-fit: cover; }
    .remove-btn {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(0,0,0,0.6);
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 11px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .snippet {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .snippet:hover { border-color: #2563eb; }
    .snippet-title { font-weight: 600; color: #1e40af; }
    .snippet-link { color: #94a3b8; font-size: 11px; }
    .snippet-text { color: #334155; margin: 4px 0 0; }
    .search-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .search-btn:hover { background: #1d4ed8; }
    .save-btn {
      background: #16a34a;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-right: 6px;
    }
    .save-btn:hover { background: #15803d; }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #94a3b8; }
    .loading { color: #64748b; font-size: 12px; }
    .error { color: #dc2626; font-size: 12px; }
    .url-input-row { display: flex; gap: 6px; margin-top: 6px; }
    .url-input-row input {
      flex: 1;
      padding: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 12px;
    }
    .url-input-row button {
      padding: 6px 10px;
      border: 1px solid #cbd5e1;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Product Enrichment</h1>
  <div class="shop-info" id="shopInfo">Loading…</div>

  <div class="toolbar">
    <button id="prevBtn" disabled>◀ Prev</button>
    <button id="nextBtn">Next ▶</button>
    <span class="page-info" id="pageInfo">Page 1</span>
    <span style="flex: 1"></span>
    <label class="page-info">
      Page size:
      <select id="pageSize">
        <option>10</option>
        <option selected>15</option>
        <option>25</option>
      </select>
    </label>
  </div>

  <div id="products">Loading products…</div>

  <script src="/app.js"></script>
</body>
</html>
