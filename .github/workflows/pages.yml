name: Deploy capacity page to GitHub Pages

# Publishes billmaker/docs/ as a static site so the capacity page has a public,
# shareable URL (e.g. for a LinkedIn post):
#   https://<user>.github.io/<repo>/            → the capacity page (index)
#   https://<user>.github.io/<repo>/scale.html  → same page
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'billmaker/docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r billmaker/docs/. _site/
          cp billmaker/docs/scale.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
